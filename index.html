      height: 20px;
      border-radius: 50%;

      gap: 12px;

      color: #666;

    const total = ratings.length;

    function percentileToNota(p) {
      const index = (p / 100) * (total - 1);
      const lo = Math.floor(index);
      const hi = Math.ceil(index);
      const w = index - lo;
      return +(ratings[lo] * (1 - w) + ratings[hi] * w).toFixed(1);
    }

    function notaToPercentile(nota) {
      let lo = 0, hi = total - 1;
      while (lo < hi) {
        const mid = (lo + hi) >> 1;
        if (ratings[mid] < nota) lo = mid + 1;
        else hi = mid;
      }
      return Math.round((lo / (total - 1)) * 100);
    }

    const searchInput  = document.getElementById("search-input");
    const searchResults = document.getElementById("search-results");

    function notaToPercentileExact(nota) {
      let lo = 0, hi = total - 1;
      while (lo < hi) {
        const mid = (lo + hi) >> 1;
        if (ratings[mid] < nota) lo = mid + 1;
        else hi = mid;
      }
      return Math.round((lo / (total - 1)) * 100);
    }

    searchInput.addEventListener("input", () => {
      const q = searchInput.value.trim().toLowerCase();
      searchResults.innerHTML = "";
      if (!q) return;

      const matches = movies.filter(m => m.t.toLowerCase().includes(q)).slice(0, 10);
      if (matches.length === 0) {
        searchResults.innerHTML = `<div class="no-results">Sin resultados</div>`;
        return;
      }
      matches.forEach(m => {
        const p = notaToPercentileExact(m.n);
        const row = document.createElement("div");
        row.className = "movie-row";
        row.innerHTML = `
          <div class="movie-info">
            <div class="movie-title">${m.t}</div>
            <div class="movie-year">${m.y ?? "—"}</div>
          </div>
          <div class="movie-stats">
            <div class="movie-nota">${m.n.toFixed(1)}</div>
            <div class="movie-pct">P${p}</div>
          </div>`;
        searchResults.appendChild(row);
      });
    });
